baseURL = 'https://bbpeaches.com/'
defaultContentLanguage = 'zh'  # 默认语言为中文
theme = 'PaperMod'

[outputs]
  home = ["HTML", "RSS", "JSON"]

# 全局通用参数
[params]
  ShowReadingTime = true       # 显示预计阅读时间
  ShowWordCount = true         # 显示文章字数
  ShowToc = true               # 自动在长文章开头生成悬浮目录
  ShowCodeCopyButtons = true   # 代码块右上角开启“一键复制”按钮
  ShowBreadCrumbs = true       # 开启面包屑导航 (主页 > 专栏 > 文章)
  ShowPostNavLinks = true      # 文章底部显示“上一篇/下一篇”
  math = true                  # 开启数学公式渲染

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/bbpeaches"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:kaelenchow@gmail.com"

# 多语言配置
[languages]

  # 1. 中文设置
  [languages.zh]
    languageName = "中文"  # 切换按钮上显示的文字
    title = 'Kaelen 的个人主页'
    weight = 1

    [languages.zh.params.homeInfoParams]
      Title = "欢迎来到我的数字花园 👋"
      Content = "你好！我是 Kaelen。"

    # 中文菜单
    [[languages.zh.menu.main]]
      identifier = "search"
      name = "搜索🔍"
      url = "/search/"
      weight = 5
    [[languages.zh.menu.main]]
      identifier = "archives"
      name = "归档"
      url = "/archives/"
      weight = 10
    [[languages.zh.menu.main]]
      identifier = "tags"
      name = "标签"
      url = "/tags/"
      weight = 20
    [[languages.zh.menu.main]]
      identifier = "about"
      name = "关于"
      url = "/about/"
      weight = 30

  # 2. 英文设置
  [languages.en]
    languageName = "English" # 切换按钮上显示的文字
    title = "Kaelen's Homepage"
    weight = 2

    [languages.en.params.homeInfoParams]
      Title = "Welcome to my digital garden 👋"
      Content = "Hi! I'm Kaelen."

    # 英文菜单
    [[languages.en.menu.main]]
      identifier = "search"
      name = "Search🔍"
      url = "/search/"
      weight = 5
    [[languages.en.menu.main]]
      identifier = "archives"
      name = "Archives"
      url = "/archives/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "tags"
      name = "Tags"
      url = "/tags/"
      weight = 20
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About"
      url = "/about/"
      weight = 30